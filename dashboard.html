<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Satisfaction Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Patient Satisfaction Dashboard</h1>
            <p class="text-gray-600">Department feedback analytics</p>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700">Start Date</label>
                <input type="date" id="startDate" class="mt-1 p-2 border rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">End Date</label>
                <input type="date" id="endDate" class="mt-1 p-2 border rounded-md">
            </div>
            <button onclick="fetchData()" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition">
                Apply Filters
            </button>
        </div>

        <div id="chartContainer" class="bg-white p-6 rounded-lg shadow-md h-96"></div>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://cqwicgpyxxkwyvnckgeh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw'
        );

        async function fetchData() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            let query = supabase.from('patient_feedback').select('device_id, feedback_type');
            if (start) query = query.gte('created_at', start);
            if (end) query = query.lte('created_at', end);

            const { data, error } = await query;
            if (error) {
                alert('Error fetching data: ' + error.message);
                return;
            }
            updateChart(data);
        }

        function updateChart(data) {
            const departments = [...new Set(data.map(item => item.device_id))];
            const feedbackTypes = ['veryhappy', 'happy', 'unhappy', 'very unhappy'];

            const series = feedbackTypes.map(type => ({
                name: type,
                data: departments.map(dept => data.filter(d => d.device_id === dept && d.feedback_type === type).length)
            }));

            Highcharts.chart('chartContainer', {
                chart: { type: 'column' },
                title: { text: 'Feedback Distribution by Department' },
                xAxis: { categories: departments },
                yAxis: { min: 0, title: { text: 'Number of Patients' } },
                plotOptions: { column: { stacking: 'normal' } },
                series: series
            });
        }

        // Initial Load
        fetchData();
    </script>
</body>
</html>
