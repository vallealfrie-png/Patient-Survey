<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHMC | Satisfaction Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-2xl border border-slate-200">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Feedback Distribution</h4>
            <canvas id="feedbackTypeChart"></canvas>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-200">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Feedback per Department</h4>
            <canvas id="deptChart"></canvas>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cqwicgpyxxkwyvnckgeh.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY_HERE'; 
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            // UPDATED: Now selecting feedback_type to enable analysis
            const { data, error } = await client
                .from('patient_feedback')
                .select('device_id, feedback_type, created_at');

            if (error) { console.error("Query Error:", error); return; }
            if (!data || data.length === 0) { console.warn("No records found."); return; }

            renderCharts(data);
        }

        function renderCharts(data) {
            // 1. Count by Feedback Type
            const feedbackCounts = data.reduce((acc, row) => {
                const type = row.feedback_type || 'Unknown';
                acc[type] = (acc[type] || 0) + 1;
                return acc;
            }, {});

            // 2. Count by Department (device_id)
            const deptCounts = data.reduce((acc, row) => {
                const dept = row.device_id || 'Unspecified';
                acc[dept] = (acc[dept] || 0) + 1;
                return acc;
            }, {});

            // Render Feedback Type Chart (Doughnut)
            new Chart(document.getElementById('feedbackTypeChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(feedbackCounts),
                    datasets: [{ data: Object.values(feedbackCounts), backgroundColor: ['#22c55e', '#eab308', '#f97316', '#ef4444'] }]
                }
            });

            // Render Department Chart (Bar)
            new Chart(document.getElementById('deptChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(deptCounts),
                    datasets: [{ label: 'Feedback Count', data: Object.values(deptCounts), backgroundColor: '#4f46e5' }]
                }
            });
        }

        fetchData();
    </script>
</body>
</html>
