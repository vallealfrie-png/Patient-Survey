<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHMC | Interactive Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-3d.js"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-80 bg-white border-r border-slate-200 p-6 shadow-sm overflow-y-auto">
        <h2 class="text-[10px] font-black text-slate-400 tracking-[0.2em] uppercase mb-8">Departments</h2>
        <div id="dept-list" class="space-y-2">
            </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h1 id="header-title" class="text-3xl font-black italic text-indigo-600 mb-8">ALL DEPARTMENTS</h1>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Total</h3>
                <p id="total-count" class="text-3xl font-black text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
                <h3 class="text-[10px] uppercase font-bold text-emerald-600 tracking-widest">Very Happy</h3>
                <p id="very-happy-count" class="text-3xl font-black text-emerald-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-lime-100">
                <h3 class="text-[10px] uppercase font-bold text-lime-600 tracking-widest">Happy</h3>
                <p id="happy-count" class="text-3xl font-black text-lime-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-100">
                <h3 class="text-[10px] uppercase font-bold text-orange-600 tracking-widest">Unhappy</h3>
                <p id="unhappy-count" class="text-3xl font-black text-orange-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-red-100">
                <h3 class="text-[10px] uppercase font-bold text-red-600 tracking-widest">Very Unhappy</h3>
                <p id="very-unhappy-count" class="text-3xl font-black text-red-800">0</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <div id="chart-container" class="h-96 w-full"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://cqwicgpyxxkwyvnckgeh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allData = [];

        async function init() {
            const { data } = await client.from('patient_feedback').select('feedback_type, device_id');
            if (!data) return;
            allData = data;

            // Generate Sidebar Buttons
            const depts = [...new Set(data.map(d => d.device_id))];
            const list = document.getElementById('dept-list');
            
            const allBtn = document.createElement('button');
            allBtn.innerText = "ALL DEPARTMENTS";
            allBtn.className = "w-full text-left p-3 bg-indigo-600 text-white rounded-lg font-bold";
            allBtn.onclick = () => updateView('ALL DEPARTMENTS', allData);
            list.appendChild(allBtn);

            depts.forEach(dept => {
                const btn = document.createElement('button');
                btn.innerText = dept;
                btn.className = "w-full text-left p-3 hover:bg-slate-100 rounded-lg font-semibold transition";
                btn.onclick = () => updateView(dept, allData.filter(d => d.device_id === dept));
                list.appendChild(btn);
            });

            updateView('ALL DEPARTMENTS', allData);
        }

        function updateView(deptName, filteredData) {
            document.getElementById('header-title').innerText = deptName;
            
            const getCount = (type) => filteredData.filter(d => String(d.feedback_type).toLowerCase() === type.toLowerCase()).length;
            
            document.getElementById('total-count').innerText = filteredData.length;
            document.getElementById('very-happy-count').innerText = getCount('very-happy');
            document.getElementById('happy-count').innerText = getCount('happy');
            document.getElementById('unhappy-count').innerText = getCount('unhappy');
            document.getElementById('very-unhappy-count').innerText = getCount('very-unhappy');

            Highcharts.chart('chart-container', {
                chart: { type: 'column', options3d: { enabled: true, alpha: 10, beta: 25, depth: 70 } },
                title: { text: `Feedback for ${deptName}` },
                xAxis: { categories: ['V.Happy', 'Happy', 'Unhappy', 'V.Unhappy'] },
                series: [{ name: 'Count', data: [getCount('very-happy'), getCount('happy'), getCount('unhappy'), getCount('very-unhappy')], color: '#4f46e5' }],
                credits: { enabled: false }
            });
        }
        init();
    </script>
</body>
</html>
