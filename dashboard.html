<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHMC | Patient Satisfaction Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-8">
    <h1 class="text-3xl font-black mb-8 italic text-slate-800">PATIENT SATISFACTION ANALYTICS 🏥</h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-3xl shadow-xl">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-6">By Department</h4>
            <canvas id="deptChart" height="200"></canvas>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-6">Feedback Trend (Emoji Sentiment)</h4>
            <canvas id="trendChart" height="200"></canvas>
        </div>
    </div>

    <script>
        const SB_URL = 'https://cqwicgpyxxkwyvnckgeh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        const emojiMap = {
            'very-happy': '🤩',
            'happy': '🙂',
            'unhappy': '🙁',
            'very-unhappy': '😡'
        };

        async function initDashboard() {
            const { data, error } = await supabase
                .from('patient_feedback')
                .select('device_id, feedback_type, created_at');

            if (error) return console.error(error);

            renderDeptChart(data);
            renderTrendChart(data);
        }

        function renderDeptChart(data) {
            const counts = data.reduce((acc, curr) => {
                acc[curr.device_id] = (acc[curr.device_id] || 0) + 1;
                return acc;
            }, {});

            new Chart(document.getElementById('deptChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        label: 'Total Feedback',
                        data: Object.values(counts),
                        backgroundColor: '#6366f1'
                    }]
                }
            });
        }

        function renderTrendChart(data) {
            // Group by month
            const trends = data.reduce((acc, curr) => {
                const month = curr.created_at.slice(0, 7);
                acc[month] = (acc[month] || 0) + 1;
                return acc;
            }, {});

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(trends),
                    datasets: [{
                        label: 'Feedback Volume',
                        data: Object.values(trends),
                        borderColor: '#2dd4bf',
                        tension: 0.4
                    }]
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>
