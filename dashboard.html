<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHMC | Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
</head>
<body class="bg-slate-50 flex h-screen">

    <aside class="w-80 bg-white border-r p-6 shadow-sm">
        <h2 class="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-6">Feedback Distribution</h2>
        <div id="highcharts-container" class="h-96"></div>
    </aside>

    <main class="flex-1 p-8">
        <h1 class="text-2xl font-black italic text-indigo-600 mb-6">PHMC OVERVIEW</h1>
        <div id="total-card" class="bg-white p-6 rounded-2xl shadow-sm w-48 border">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase">Total Feedback</h3>
            <p id="total-count" class="text-3xl font-black">0</p>
        </div>
    </main>

    <script>
        const client = supabase.createClient('https://cqwicgpyxxkwyvnckgeh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw');

        async function init() {
            const { data } = await client.from('patient_feedback').select('feedback_type');
            if (!data) return;

            // Update Count
            document.getElementById('total-count').innerText = data.length;

            // Update Chart
            const types = ['very-happy', 'happy', 'unhappy', 'very-unhappy'];
            const counts = types.map(t => data.filter(d => d.feedback_type === t).length);

            Highcharts.chart('highcharts-container', {
                chart: { type: 'column', backgroundColor: 'transparent' },
                title: { text: '' },
                xAxis: { categories: ['Very Happy', 'Happy', 'Unhappy', 'Very Unhappy'] },
                series: [{ name: 'Count', data: counts, color: '#6366f1' }],
                credits: { enabled: false }
            });
        }
        init();
    </script>
</body>
</html>
