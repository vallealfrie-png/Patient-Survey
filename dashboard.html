<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHMC | Advanced Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-3d.js"></script>
    <style>
        .pulse-active { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-80 bg-white border-r border-slate-200 p-6 shadow-sm overflow-y-auto">
        <h2 class="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-6">Departments</h2>
        <div id="dept-list" class="space-y-2 mb-8"></div>
        <h2 class="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-6">Month</h2>
        <select id="month-selector" onchange="updateView()" class="w-full p-3 bg-slate-100 rounded-lg font-bold text-sm">
            <option value="ALL">All Months</option>
            <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option>
            <option value="05">May</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Aug</option>
        </select>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h1 id="header-title" class="text-3xl font-black italic text-indigo-600 mb-8">ALL DEPARTMENTS</h1>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div id="card-total" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 transition hover:scale-105"><h3 class="text-[10px] uppercase font-bold text-slate-400">Total</h3><p id="total-count" class="text-3xl font-black">0</p></div>
            <div onclick="setSort('very-happy')" id="card-very-happy" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-emerald-500 cursor-pointer transition hover:scale-105"><h3 class="text-[10px] uppercase font-bold text-emerald-600">Very Happy</h3><p id="very-happy-count" class="text-3xl font-black text-emerald-800">0</p></div>
            <div onclick="setSort('happy')" id="card-happy" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-lime-500 cursor-pointer transition hover:scale-105"><h3 class="text-[10px] uppercase font-bold text-lime-600">Happy</h3><p id="happy-count" class="text-3xl font-black text-lime-800">0</p></div>
            <div onclick="setSort('unhappy')" id="card-unhappy" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-orange-500 cursor-pointer transition hover:scale-105"><h3 class="text-[10px] uppercase font-bold text-orange-600">Unhappy</h3><p id="unhappy-count" class="text-3xl font-black text-orange-800">0</p></div>
            <div onclick="setSort('very-unhappy')" id="card-very-unhappy" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-red-500 cursor-pointer transition hover:scale-105"><h3 class="text-[10px] uppercase font-bold text-red-600">Very Unhappy</h3><p id="very-unhappy-count" class="text-3xl font-black text-red-800">0</p></div>
        </div>

        <div class="grid grid-cols-3 gap-8">
            <div class="col-span-2 bg-white p-6 rounded-3xl shadow-sm border"><div id="chart-container" class="h-80 w-full"></div></div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border"><h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Top Departments</h3><div id="leaderboard-list" class="space-y-3"></div></div>
        </div>
    </main>

    <script>
        const client = window.supabase.createClient('https://cqwicgpyxxkwyvnckgeh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw');
        let allData = [], currentDept = 'ALL DEPARTMENTS', currentSort = 'very-happy';

        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id), range = end - start, minTimer = 50;
            let stepTime = Math.abs(Math.floor(duration / range));
            stepTime = Math.max(stepTime, minTimer);
            let startTime = new Date().getTime(), endTime = startTime + duration;
            let timer;
            function run() {
                let now = new Date().getTime(), remaining = Math.max((endTime - now) / duration, 0);
                let value = Math.round(end - (remaining * range));
                obj.innerHTML = value;
                if (value == end) clearInterval(timer);
            }
            timer = setInterval(run, stepTime);
        }

        function setSort(type) { 
            currentSort = type; 
            document.querySelectorAll('[id^="card-"]').forEach(el => el.classList.remove('pulse-active'));
            document.getElementById('card-' + type).classList.add('pulse-active');
            updateView(); 
        }

        async function init() {
            const { data } = await client.from('patient_feedback').select('feedback_type, device_id, created_at');
            allData = data || [];
            const depts = [...new Set(allData.map(d => d.device_id))];
            const list = document.getElementById('dept-list');
            
            const allBtn = document.createElement('button');
            allBtn.innerText = "ALL DEPARTMENTS";
            allBtn.className = "w-full text-left p-3 bg-indigo-600 text-white rounded-lg font-bold transition hover:bg-indigo-700";
            allBtn.onclick = () => { currentDept = 'ALL DEPARTMENTS'; updateView(); };
            list.appendChild(allBtn);

            depts.forEach(dept => {
                const btn = document.createElement('button');
                btn.innerText = dept;
                btn.className = "w-full text-left p-3 hover:bg-slate-200 rounded-lg font-semibold transition";
                btn.onclick = () => { currentDept = dept; updateView(); };
                list.appendChild(btn);
            });
            setSort('very-happy');
        }

        function updateView() {
            const month = document.getElementById('month-selector').value;
            let filtered = allData;
            if (currentDept !== 'ALL DEPARTMENTS') filtered = filtered.filter(d => d.device_id === currentDept);
            if (month !== 'ALL') filtered = filtered.filter(d => new Date(d.created_at).getMonth() + 1 === parseInt(month));

            document.getElementById('header-title').innerText = currentDept;
            const getC = (t) => filtered.filter(d => String(d.feedback_type).toLowerCase() === t.toLowerCase()).length;
            const vals = [getC('very-happy'), getC('happy'), getC('unhappy'), getC('very-unhappy')];
            
            animateValue('total-count', 0, filtered.length, 1000);
            animateValue('very-happy-count', 0, vals[0], 1000);
            animateValue('happy-count', 0, vals[1], 1000);
            animateValue('unhappy-count', 0, vals[2], 1000);
            animateValue('very-unhappy-count', 0, vals[3], 1000);

            const depts = [...new Set(allData.map(d => d.device_id))];
            const sorted = depts.map(d => ({ name: d, count: filtered.filter(item => item.device_id === d && item.feedback_type.toLowerCase() === currentSort.toLowerCase()).length }))
                              .sort((a, b) => b.count - a.count);
            document.getElementById('leaderboard-list').innerHTML = sorted.map(l => `<div class="flex justify-between p-2 bg-slate-50 rounded font-bold text-sm"><span>${l.name}</span><span class="text-indigo-600">${l.count}</span></div>`).join('');

            Highcharts.chart('chart-container', {
                chart: { type: 'column', options3d: { enabled: true, alpha: 10, beta: 25, depth: 70 } },
                title: { text: `Feedback Distribution: ${currentDept}` },
                xAxis: { categories: ['V.Happy', 'Happy', 'Unhappy', 'V.Unhappy'] },
                series: [{ name: 'Count', data: vals.map((v, i) => ({ y: v, color: ['#10b981', '#84cc16', '#fb923c', '#ef4444'][i] })) }],
                credits: { enabled: false }
            });
        }
        init();
    </script>
</body>
</html>
