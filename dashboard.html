<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHMC | Patient Satisfaction Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container { position: relative; height: 350px; width: 100%; }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">

    <header class="mb-10">
        <h1 class="text-3xl font-black italic text-indigo-600 tracking-tighter">PHMC ANALYTICS</h1>
        <p class="text-slate-400 font-bold tracking-widest text-[10px] uppercase">Departmental Performance & Feedback Trends</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="card">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-6">Feedback by Department (Device ID)</h4>
            <div class="chart-container"><canvas id="deptChart"></canvas></div>
        </div>

        <div class="card">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-6">Feedback Volume Trends</h4>
            <div class="chart-container"><canvas id="trendChart"></canvas></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cqwicgpyxxkwyvnckgeh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function runDashboard() {
            try {
                // CORRECTED: Using device_id as the primary dimension
                const { data, error } = await supabaseClient
                    .from('patient_feedback')
                    .select('device_id, created_at, feedback_type');

                if (error) throw error;
                if (!data || data.length === 0) return;

                processData(data);
            } catch (err) {
                console.error("Dashboard Error:", err.message);
            }
        }

        function processData(data) {
            // Grouping by device_id (Department)
            const deptData = data.reduce((acc, row) => {
                const dept = row.device_id || 'Unspecified';
                acc[dept] = (acc[dept] || 0) + 1;
                return acc;
            }, {});

            // Grouping by date for trend
            const trendData = data.reduce((acc, row) => {
                const date = row.created_at ? new Date(row.created_at).toLocaleDateString() : 'Unknown';
                acc[date] = (acc[date] || 0) + 1;
                return acc;
            }, {});

            new Chart(document.getElementById('deptChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(deptData),
                    datasets: [{
                        label: 'Volume',
                        data: Object.values(deptData),
                        backgroundColor: '#6366f1'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(trendData),
                    datasets: [{
                        label: 'Total Feedback',
                        data: Object.values(trendData),
                        borderColor: '#10b981',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        runDashboard();
    </script>
</body>
</html>
