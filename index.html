<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Feedback Survey</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .survey-bg { background-color: #038752; }
        .selected { transform: scale(1.2); opacity: 1 !important; filter: drop-shadow(0 0 10px rgba(0,0,0,0.2)); }
    </style>
</head>
<body class="survey-bg min-h-screen p-4 md:p-8 flex items-center justify-center">

    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden p-8 space-y-6">
        <!-- Logo Header -->
        <div class="flex justify-center border-b pb-6">
            <img src="https://i.imgur.com/VbZKWAf.png" alt="Company Logo" class="h-16 object-contain">
        </div>

        <!-- Patient ID Input -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Patient ID Number</label>
            <input id="patientId" type="text" placeholder="Enter ID here..." class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none">
        </div>

        <!-- Feedback Emoticons -->
        <div class="text-center">
            <p class="text-lg font-semibold text-gray-800 mb-4">How was your visit today?</p>
            <div class="flex justify-center gap-12 mb-6">
                <button type="button" onclick="selectFeeling('smile')" id="btn-smile" class="text-6xl opacity-40 transition-all hover:opacity-100">😊</button>
                <button type="button" onclick="selectFeeling('sad')" id="btn-sad" class="text-6xl opacity-40 transition-all hover:opacity-100">☹️</button>
            </div>
        </div>

        <!-- Comment Section -->
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Help Us Improve</label>
            <textarea id="comment" rows="3" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none" placeholder="Your feedback matters..."></textarea>
        </div>

        <!-- Advertisement Container -->
        <div class="w-full h-32 bg-gray-100 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-300">
            <span class="text-gray-400 font-medium">Advertisement Space</span>
        </div>

        <!-- Submit Button -->
        <button onclick="submitSurvey()" class="w-full py-4 bg-[#038752] text-white font-bold rounded-xl text-lg hover:bg-emerald-800 transition-all">
            Submit Feedback
        </button>
    </div>

    <script>
        // Supabase Initialization
        const supabase = supabase.createClient(
            'https://cqwicgpyxxkwyvnckgeh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw'
        );

        let currentFeeling = '';

        function selectFeeling(type) {
            currentFeeling = type;
            // Update visual state
            document.getElementById('btn-smile').classList.toggle('selected', type === 'smile');
            document.getElementById('btn-sad').classList.toggle('selected', type === 'sad');
        }

        async function submitSurvey() {
            const patientId = document.getElementById('patientId').value;
            const comment = document.getElementById('comment').value;

            if (!patientId || !currentFeeling) {
                alert('Please enter your Patient ID and select an emoticon!');
                return;
            }

            const { error } = await supabase
                .from('patient_feedback')
                .insert([{ 
                    patient_id: patientId, 
                    feedback_type: currentFeeling, 
                    comment: comment 
                }]);

            if (error) {
                alert('Error submitting: ' + error.message);
            } else {
                alert('Thank you for your feedback!');
                location.reload(); // Refresh to clear form
            }
        }
    </script>
</body>
</html>
