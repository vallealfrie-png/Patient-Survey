<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Staff Portal | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --corp-green: #007941; --corp-light: #10b981; --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.2); }
    body { margin: 0; padding: 0; overflow: hidden; background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%); font-family: ui-sans-serif, system-ui; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    .glass-card { position: relative; width: 100%; max-width: 380px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 2.5rem; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); opacity: 0; animation: cardEntry 1s ease-out forwards; overflow: hidden; }
    @keyframes cardEntry { to { opacity: 1; transform: translateY(0); } }
    .glass-card::after { content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 4px; background: linear-gradient(to bottom, transparent, var(--corp-light), transparent); animation: scan 4s linear infinite; }
    @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
    input { background: rgba(0, 0, 0, 0.2) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
    input:focus { border-color: var(--corp-light) !important; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="glass-card">
    <img src="https://i.imgur.com/VbZKWAf.png" class="h-16 mx-auto mb-6 object-contain" />
    <form id="login-form" class="space-y-5">
      <input id="email" type="email" required placeholder="email@hospital.com" class="w-full px-4 py-3 rounded-xl outline-none text-sm" />
      <div class="relative">
        <input id="password" type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl outline-none text-sm" />
        <button type="button" id="togglePassword" class="absolute right-4 top-3 text-emerald-500">👁️</button>
      </div>
      <button type="submit" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl text-xs uppercase tracking-widest">Initialize Login</button>
    </form>
    <p id="error" class="hidden text-red-400 text-center mt-4 text-xs bg-red-900/20 p-2 rounded-lg"></p>
  </div>

  <script>
    // Supabase Initialization with your provided key
    const supabase = window.supabase.createClient(
      'https://xpdtzvxjlguhcxkgowsg.supabase.co', 
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwZHR6dnhqbGd1aGN4a2dvd3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.YOUR_ACTUAL_ANON_KEY'
    );

    // Toggle Password
    document.getElementById('togglePassword').addEventListener('click', function() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
      this.textContent = p.type === 'password' ? '👁️' : '🙈';
    });

    // Login logic
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      if (error) {
        const err = document.getElementById('error');
        err.textContent = error.message;
        err.classList.remove('hidden');
      } else {
        window.location.href = "survey.html";
      }
    });

    // Molecule Animation
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Molecule logic remains...
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
