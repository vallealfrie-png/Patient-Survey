<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Feedback Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .survey-bg { background-color: #038752; }
        
        .emoji-btn { 
            transition: all 0.3s ease; 
            opacity: 0.3; 
            cursor: pointer; 
            font-size: 4rem; 
            filter: grayscale(100%);
        }
        
        @keyframes pulse-glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* State when selected */
        .pulse-active { 
            opacity: 1 !important; 
            filter: grayscale(0%) !important;
            animation: pulse-glow 1.5s infinite;
        }

        /* Color Glows (Since emojis cannot be 'colored' like text) */
        .active-very-happy { filter: drop-shadow(0 0 15px #16a34a) grayscale(0%); }
        .active-happy { filter: drop-shadow(0 0 15px #84cc16) grayscale(0%); }
        .active-unhappy { filter: drop-shadow(0 0 15px #fca5a5) grayscale(0%); }
        .active-very-unhappy { filter: drop-shadow(0 0 15px #dc2626) grayscale(0%); }
    </style>
</head>
<body class="survey-bg min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Form Section -->
        <div class="md:col-span-2 space-y-6">
            <img src="https://i.imgur.com/VbZKWAf.png" class="h-16 object-contain">
            <h2 class="text-2xl font-bold text-gray-800 text-center">We Value your Feedback</h2>
            
            <input id="patientId" type="text" placeholder="Enter Patient ID Number" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none">

            <div class="text-center py-4">
                <p class="font-bold text-gray-700 mb-6">How was your visit today?</p>
                <div class="flex justify-center gap-6">
                    <button type="button" data-value="very-happy" class="emoji-btn">😁</button>
                    <button type="button" data-value="happy" class="emoji-btn">🙂</button>
                    <button type="button" data-value="unhappy" class="emoji-btn">🙁</button>
                    <button type="button" data-value="very-unhappy" class="emoji-btn">☹️</button>
                </div>
            </div>

            <textarea id="comment" rows="3" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none" placeholder="Help us improve..."></textarea>
            
            <button id="submitBtn" class="w-full py-4 bg-[#038752] text-white font-bold rounded-xl text-xl hover:bg-emerald-800 transition-all">
                Submit Feedback
            </button>
        </div>

        <!-- Ad Sidebar -->
        <div class="hidden md:flex flex-col items-center justify-center bg-gray-100 rounded-2xl border-4 border-dashed border-gray-300 p-4">
            <span class="text-gray-400 font-bold uppercase rotate-90 md:rotate-0">Advertisement</span>
        </div>
    </div>

    <script>
        // Supabase Init
        window.surveyClient = window.surveyClient || supabase.createClient(
            'https://cqwicgpyxxkwyvnckgeh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw'
        );

        let currentFeeling = '';

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFeeling = btn.getAttribute('data-value');
                
                // Reset all
                document.querySelectorAll('.emoji-btn').forEach(b => {
                    b.classList.remove('pulse-active', 'active-very-happy', 'active-happy', 'active-unhappy', 'active-very-unhappy');
                });

                // Set active
                btn.classList.add('pulse-active', 'active-' + currentFeeling);
            });
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const patientId = document.getElementById('patientId').value;
            const comment = document.getElementById('comment').value;

            if (!patientId || !currentFeeling) return alert('Please enter ID and select an emoji!');

            const { error } = await window.surveyClient.from('patient_feedback').insert([{ 
                patient_id: patientId, 
                feedback_type: currentFeeling, 
                comment: comment,
                device_id: 'Tablet-01' 
            }]);

            if (error) alert('Error: ' + error.message);
            else {
                alert('Thank you for your feedback!');
                location.reload();
            }
        });
    </script>
</body>
</html>
