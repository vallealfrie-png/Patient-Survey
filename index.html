<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .survey-bg { background-color: #038752; }
        .emoji-btn { 
            transition: all 0.3s ease; 
            opacity: 0.4; 
            cursor: pointer; 
            width: 90px; 
            height: 90px;
            fill: #94a3b8; /* Gray default */
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .pulse-active { opacity: 1 !important; animation: pulse-glow 1.5s infinite; }
        
        /* Specific Colors */
        .active-very-happy { fill: #16a34a !important; } /* Green */
        .active-happy { fill: #84cc16 !important; }      /* Light Green */
        .active-unhappy { fill: #fca5a5 !important; }    /* Light Red */
        .active-very-unhappy { fill: #dc2626 !important; } /* Red */
    </style>
</head>
<body class="survey-bg min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2 space-y-6">
            <img src="https://i.imgur.com/VbZKWAf.png" class="h-16 object-contain">
            <h2 class="text-2xl font-bold text-gray-800 text-center">We Value your Feedback</h2>
            
            <input id="patientId" type="text" placeholder="Enter Patient ID Number" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none">

            <div class="text-center py-4">
                <p class="font-bold text-gray-700 mb-6">How was your visit today?</p>
                <div class="flex justify-center gap-6">
                    <!-- Very Happy -->
                    <button type="button" data-value="very-happy" class="emoji-btn">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-4-11h1.5l1.5 1.5 1.5-1.5H16l-2.5 3 2.5 3h-1.5l-1.5-1.5-1.5 1.5H8l2.5-3-2.5-3z" transform="scale(0.8) translate(3 3)"></path><path d="M12 17.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                    </button>
                    <!-- Happy -->
                    <button type="button" data-value="happy" class="emoji-btn">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/></svg>
                    </button>
                    <!-- Unhappy -->
                    <button type="button" data-value="unhappy" class="emoji-btn">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 16s1.5-1 4-1 4 1 4 1"/><circle cx="9" cy="9" r="1.2"/><circle cx="15" cy="9" r="1.2"/></svg>
                    </button>
                    <!-- Very Unhappy -->
                    <button type="button" data-value="very-unhappy" class="emoji-btn">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 17s1.5-2 4-2 4 2 4 2"/><path d="M9 7l2 2m0-2l-2 2m4 0l2-2m-2 0l2 2"/></svg>
                    </button>
                </div>
            </div>

            <textarea id="comment" rows="3" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none" placeholder="Help us improve..."></textarea>
            
            <button id="submitBtn" class="w-full py-4 bg-[#038752] text-white font-bold rounded-xl text-xl hover:bg-emerald-800 transition-all">
                Submit Feedback
            </button>
        </div>

        <div class="hidden md:flex flex-col items-center justify-center bg-gray-100 rounded-2xl border-4 border-dashed border-gray-300 p-4">
            <span class="text-gray-400 font-bold uppercase rotate-90 md:rotate-0">Advertisement</span>
        </div>
    </div>

    <script>
        window.surveyClient = window.surveyClient || supabase.createClient(
            'https://cqwicgpyxxkwyvnckgeh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw'
        );

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-value');
                document.querySelectorAll('.emoji-btn').forEach(b => {
                    b.classList.remove('pulse-active', 'active-very-happy', 'active-happy', 'active-unhappy', 'active-very-unhappy');
                });
                btn.classList.add('pulse-active', 'active-' + val);
            });
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const selected = document.querySelector('.pulse-active');
            if (!selected) return alert('Please select a rating!');
            
            const { error } = await window.surveyClient.from('patient_feedback').insert([{ 
                patient_id: document.getElementById('patientId').value, 
                feedback_type: selected.getAttribute('data-value'), 
                comment: document.getElementById('comment').value,
                device_id: 'Tablet-01' 
            }]);
            
            if (error) alert('Error: ' + error.message);
            else { alert('Thank you!'); location.reload(); }
        });
    </script>
</body>
</html>
