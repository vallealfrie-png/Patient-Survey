<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Staff Portal | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --corp-green: #007941;
      --corp-light: #10b981;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.2);
    }
    body {
      margin: 0; padding: 0; overflow: hidden;
      background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%);
      font-family: ui-sans-serif, system-ui;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      perspective: 1200px;
    }
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    .glass-card {
      position: relative; width: 100%; max-width: 380px; 
      background: var(--glass-bg); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: 2.5rem;
      padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: cardProject 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes cardProject { to { opacity: 1; transform: translateZ(0px) scale(1); } }
    input { background: rgba(0, 0, 0, 0.2) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
    input:focus { border-color: var(--corp-light) !important; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="glass-card opacity-0">
    <div class="flex justify-center mb-6">
      <img src="https://i.imgur.com/VbZKWAf.png" alt="Logo" class="h-16 w-auto object-contain brightness-110" />
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block pl-1 text-[9px] font-bold text-emerald-500 uppercase tracking-widest mb-2">Identifier</label>
        <input id="email" type="email" required placeholder="email@hospital.com" class="w-full px-4 py-3 rounded-xl outline-none text-sm" />
      </div>

      <div class="relative">
        <label class="block pl-1 text-[9px] font-bold text-emerald-500 uppercase tracking-widest mb-2">Access Key</label>
        <input id="password" type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl outline-none text-sm pr-12" />
        <button type="button" id="togglePassword" class="absolute right-4 top-[38px] text-gray-400 hover:text-white">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl transition-all text-xs uppercase tracking-widest shadow-lg active:scale-95">
        Initialize Login
      </button>
    </form>

    <p id="error" class="hidden text-red-400 text-center mt-4 text-[10px] bg-red-900/20 p-2 rounded-lg"></p>
  </div>

  <script>
    // Supabase Initialization
    const supabase = window.supabase.createClient('https://xpdtzvxjlguhcxkgowsg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwZHR6dnhqbGd1aGN4a2dvd3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.YOUR_ANON_KEY_HERE');

    // Toggle Password Visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
    });

    // Auth Logic
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('error');
      errorBox.classList.add('hidden');
      
      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });

      if (error) {
        errorBox.textContent = error.message;
        errorBox.classList.remove('hidden');
      } else {
        window.location.href = "survey.html";
      }
    });

    // Background Canvas Logic (Kept as per your previous code)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
  </script>
</body>
</html>
