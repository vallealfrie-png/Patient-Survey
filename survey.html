<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .survey-bg { background-color: #038752; }
        
        .emoji-btn { 
            transition: all 0.3s ease; 
            opacity: 0.4; 
            cursor: pointer; 
            width: 90px; 
            height: 90px;
            padding: 5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes pulse-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .active-pulse { 
            opacity: 1 !important; 
            background-color: rgba(0,0,0,0.05);
            animation: pulse-pop 0.6s ease-out infinite;
        }
        
        /* Advertisement Styles */
        #ad-container {
            height: 500px; 
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #ad-slide {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="survey-bg min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2 space-y-6">
            <img src="https://i.imgur.com/W4iMgls.jpeg" class="w-full h-16 object-contain rounded-lg">
            
            <h2 class="text-2xl font-bold text-gray-800 text-center">We value your Feedback</h2>
            
            <input id="patientId" type="text" placeholder="Enter Patient ID Number" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none">

            <div class="text-center py-4">
                <p class="font-bold text-gray-700 mb-6">How was your visit today?</p>
                <div class="flex justify-center gap-6">
                    <button type="button" data-value="very-happy" class="emoji-btn"><img src="happy-face.png" alt="Very Happy"></button>
                    <button type="button" data-value="happy" class="emoji-btn"><img src="happiness.png" alt="Happy"></button>
                    <button type="button" data-value="unhappy" class="emoji-btn"><img src="angry.png" alt="Unhappy"></button>
                    <button type="button" data-value="very-unhappy" class="emoji-btn"><img src="angry (1).png" alt="Very Unhappy"></button>
                </div>
            </div>

            <textarea id="comment" rows="3" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#038752] outline-none" placeholder="Help us improve..."></textarea>
            
            <button id="submitBtn" class="w-full py-4 bg-[#038752] text-white font-bold rounded-xl text-xl hover:bg-emerald-800 transition-all">
                Submit Feedback
            </button>
        </div>

        <div id="ad-container" class="hidden md:flex flex-col items-center justify-center rounded-2xl border-4 border-dashed border-gray-300 p-2 overflow-hidden relative">
            <img id="ad-slide" src="https://i.imgur.com/4Fo00rK.jpeg" class="transition-opacity duration-1000">
        </div>
    </div>

    <script>
        // Supabase Initialization
        const dbClient = supabase.createClient(
            'https://cqwicgpyxxkwyvnckgeh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2ljZ3B5eHhrd3l2bmNrZ2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODI5NDAsImV4cCI6MjA5NTI1ODk0MH0.Ra7GL_MZpr0Y1yQKtZ_op1GyVNDq5htU4hx4PZRWFQw'
        );

        // Retrieve Department saved during Login
        const userDept = localStorage.getItem('user_department') || "Unknown";

        // Emoji Selection Logic
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active-pulse'));
                btn.classList.add('active-pulse');
            });
        });

        // Advertisement Slideshow Logic
        const images = [
            'https://i.imgur.com/ReKTBM0.png',
            'https://i.imgur.com/2ekGKd8.png',
            'https://i.imgur.com/vh1Xtc6.jpeg',
            'https://i.imgur.com/cMR3NlE.jpeg'
        ];

        let currentIndex = 0;
        const adSlide = document.getElementById('ad-slide');
        setInterval(() => {
            currentIndex = (currentIndex + 1) % images.length;
            adSlide.style.opacity = 0; 
            setTimeout(() => {
                adSlide.src = images[currentIndex];
                adSlide.style.opacity = 1;
            }, 500);
        }, 4000);

        // Submit Button Logic
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const selected = document.querySelector('.active-pulse');
            if (!selected) return alert('Please select a face!');
            
            const { error } = await dbClient.from('patient_feedback').insert([{ 
                patient_id: document.getElementById('patientId').value, 
                feedback_type: selected.getAttribute('data-value'), 
                comment: document.getElementById('comment').value,
                device_id: userDept // Automatically logs the department set during login
            }]);
            
            if (error) alert('Error: ' + error.message);
            else { alert('Thank you for your feedback!'); location.reload(); }
        });
    </script>
</body>
</html>
